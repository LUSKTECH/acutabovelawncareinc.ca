sonar.projectKey=LUSKTECH_acutabovelawncareinc.ca
sonar.organization=lusktech

sonar.sources=app,components,lib,content,scripts
sonar.tests=tests
sonar.test.inclusions=**/*.test.ts,**/*.test.tsx
sonar.exclusions=**/*.test.ts,**/*.test.tsx,**/node_modules/**,.next/**,public/**,coverage/**,wordpress-export/**,playwright-report/**,test-results/**,**/*.mdx

sonar.javascript.lcov.reportPaths=coverage/lcov.info

# One-shot CLI scripts are intentionally untested; exclude from coverage metrics.
sonar.coverage.exclusions=scripts/**
sonar.typescript.tsconfigPath=tsconfig.json

sonar.sourceEncoding=UTF-8
