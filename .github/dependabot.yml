version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '06:00'
      timezone: 'America/Toronto'
    open-pull-requests-limit: 10
    versioning-strategy: increase
    groups:
      next-and-react:
        patterns:
          - 'next'
          - 'next-*'
          - '@next/*'
          - 'react'
          - 'react-*'
          - '@types/react'
          - '@types/react-dom'
      eslint-and-lint:
        patterns:
          - 'eslint'
          - 'eslint-*'
          - '@eslint/*'
          - 'oxlint'
          - 'prettier'
          - 'prettier-*'
      testing:
        patterns:
          - 'vitest'
          - '@vitest/*'
          - '@playwright/*'
          - '@testing-library/*'
          - 'jsdom'
      tailwind:
        patterns:
          - 'tailwindcss'
          - '@tailwindcss/*'
    commit-message:
      prefix: 'chore(deps)'
      include: scope
    labels:
      - dependencies

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    commit-message:
      prefix: 'chore(actions)'
      include: scope
    labels:
      - dependencies
      - github-actions
