name: Accessibility

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  pa11y:
    name: pa11y-ci
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_SITE_URL: http://localhost:3000

      - name: Start server
        run: |
          (npm run start -- -p 3000 &)
          npx wait-on http://localhost:3000 -t 60000

      - name: Run pa11y-ci
        run: npx pa11y-ci --config .pa11yci.json
