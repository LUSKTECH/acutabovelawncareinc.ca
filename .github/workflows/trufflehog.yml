name: Secret scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  trufflehog:
    name: TruffleHog
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: TruffleHog OSS scan
        uses: trufflesecurity/trufflehog@37b77001d0174ebec2fcca2bd83ff83a6d45a3ab # v3.95.3
        with:
          path: ./
          # On force pushes base === head; fall back to scanning the full branch.
          base: ${{ github.event.before != '0000000000000000000000000000000000000000' && github.event.before != github.sha && github.event.before || '' }}
          head: HEAD
          extra_args: --only-verified
